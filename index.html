<script>
    // Banner Dismiss
    document.getElementById('close-banner').addEventListener('click', function() {
        const banner = document.getElementById('promo-banner');
        banner.style.marginTop = `-${banner.offsetHeight}px`;
        setTimeout(() => banner.style.display = 'none', 300);
    });

    // Sticky Navbar scroll effect
    window.addEventListener('scroll', () => {
        const nav = document.getElementById('navbar');
        if (window.scrollY > 50) {
            nav.classList.add('bg-bkbrown', 'shadow-lg');
            nav.classList.remove('bg-transparent', 'py-4');
            nav.classList.add('py-2');
        } else {
            nav.classList.remove('bg-bkbrown', 'shadow-lg');
            nav.classList.add('bg-transparent', 'py-4');
            nav.classList.remove('py-2');
        }
    });

    // Mobile Menu Toggle
    const mobileMenuBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    const mobileLinks = document.querySelectorAll('.mobile-link');

    mobileMenuBtn.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
    });

    mobileLinks.forEach(link => {
        link.addEventListener('click', () => {
            mobileMenu.classList.add('hidden');
        });
    });

    // Countdown Timer (Resets to next midnight)
    function updateTimer() {
        const now = new Date();
        const midnight = new Date(now);
        midnight.setHours(24, 0, 0, 0);
        
        const diff = midnight - now;
        const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const m = Math.floor((diff / 1000 / 60) % 60);
        const s = Math.floor((diff / 1000) % 60);
        
        document.getElementById('t-hours').innerText = h.toString().padStart(2, '0');
        document.getElementById('t-minutes').innerText = m.toString().padStart(2, '0');
        document.getElementById('t-seconds').innerText = s.toString().padStart(2, '0');
    }
    setInterval(updateTimer, 1000);
    updateTimer();

    // Menu Tab Switcher (Simulated)
    const tabs = document.querySelectorAll('.menu-tab');
    const menuContainer = document.getElementById('menu-container');

    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            // Remove active styling from all
            tabs.forEach(t => {
                t.classList.remove('border-bkyellow', 'text-bkdark');
                t.classList.add('border-transparent', 'text-gray-500');
            });
            
            // Add active styling to clicked
            tab.classList.add('border-bkyellow', 'text-bkdark');
            tab.classList.remove('border-transparent', 'text-gray-500');

            // Simulate filtering with a fade effect
            menuContainer.classList.remove('fade-content');
            void menuContainer.offsetWidth; // Trigger reflow
            menuContainer.classList.add('fade-content');
        });
    });

    // Toast Notification for Locator
    document.getElementById('zip-btn').addEventListener('click', () => {
        const input = document.getElementById('zip-input');
        if(input.value.trim() === '') return;

        // Remove existing toast if any
        const existingToast = document.getElementById('toast');
        if(existingToast) existingToast.remove();

        const toast = document.createElement('div');
        toast.id = 'toast';
        toast.className = 'fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-bkdark text-white font-bold px-6 py-3 rounded-full shadow-2xl z-50 transition-opacity duration-300 opacity-0 flex items-center gap-2';
        toast.innerHTML = `<svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Finding locations near ${input.value}...`;
        
        document.body.appendChild(toast);
        
        // Fade in
        setTimeout(() => toast.classList.remove('opacity-0'), 10);
        
        // Fade out and remove
        setTimeout(() => {
            toast.classList.add('opacity-0');
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    });

    // Intersection Observer for scroll animations
    const observerOptions = {
        root: null,
        rootMargin: '0px',
        threshold: 0.15
    };

    const observer = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                observer.unobserve(entry.target); // Run once
            }
        });
    }, observerOptions);

    document.querySelectorAll('.scroll-reveal').forEach((el) => {
        observer.observe(el);
    });
</script>
